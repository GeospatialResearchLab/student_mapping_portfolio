<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Portfolio</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --border: #dbe4ee;
      --shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
      --max-width: 1000px;
      --map-height: 420px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
    }

    .container { width: min(92%, var(--max-width)); margin: 0 auto; }

    header {
      background: linear-gradient(135deg, #134e4a, #0f766e);
      color: white;
      padding: 3rem 0 2.5rem;
    }
    header h1 { margin: 0 0 0.5rem; font-size: clamp(2rem, 4vw, 3rem); }
    header p { margin: 0; max-width: 700px; font-size: 1.05rem; color: rgba(255,255,255,0.92); }

    main { padding: 2rem 0 3rem; }

    .bio-card, .portfolio-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }
    .bio-card { padding: 1.5rem; margin-bottom: 2rem; }

    .section-title { font-size: 1.4rem; margin: 0 0 1rem; }

    .portfolio-grid { display: grid; gap: 1.5rem; }
    .portfolio-item { padding: 1.25rem; }
    .portfolio-item h3 { margin: 0 0 0.5rem; font-size: 1.2rem; }
    .portfolio-item p { margin-top: 0; }

    .portfolio-link {
      display: inline-block;
      margin-bottom: 1rem;
      color: var(--accent);
      font-weight: bold;
      text-decoration: none;
    }
    .portfolio-link:hover, .portfolio-link:focus { text-decoration: underline; }

    .media-wrapper {
      background: #f3f4f6;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    iframe, .static-map-image {
      display: block;
      width: 100%;
      height: var(--map-height);
      border: 0;
      background: white;
    }
    .static-map-image { object-fit: contain; }

    footer {
      background: #0f172a;
      color: #e5e7eb;
      padding: 1.25rem 0;
      font-size: 0.95rem;
    }
    footer .footer-inner {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.5rem;
      align-items: center;
      justify-content: space-between;
    }
    footer a { color: #a7f3d0; text-decoration: none; }
    footer a:hover, footer a:focus { text-decoration: underline; }

    @media (max-width: 700px) {
      :root { --map-height: 320px; }
      footer .footer-inner { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <header>
    <div class="container">
      <h1 id="student-name">[Student Name]</h1>
      <p id="header-intro">Welcome to my portfolio site. This page includes a short bio and examples of my geospatial work.</p>
    </div>
  </header>

  <main class="container">
    <section class="bio-card" aria-labelledby="bio-heading">
      <h2 class="section-title" id="bio-heading">About Me</h2>
      <p id="student-bio">Replace this text with your brief bio.</p>
    </section>

    <section aria-labelledby="portfolio-heading">
      <h2 class="section-title" id="portfolio-heading">Portfolio</h2>
      <div id="portfolio-container" class="portfolio-grid"></div>
    </section>
  </main>

  <footer>
    <div class="container footer-inner">
      <div>Page tools provided by the <strong>Geospatial Research Lab</strong>.</div>
      <div>Last updated: <span id="last-updated">—</span></div>
    </div>
  </footer>

  <!-- Editable data lives in student-data.js -->
  <script src="student-data.js"></script>
  <script>
    (function() {
      function byId(id) { return document.getElementById(id); }

      if (!window.studentData) {
        console.error('studentData is missing. Edit student-data.js to add your info.');
        return;
      }

      // Header and bio
      byId('student-name').textContent = studentData.name || '[Student Name]';
      byId('student-bio').textContent = studentData.bio || '';
      if (studentData.headerIntro) {
        byId('header-intro').textContent = studentData.headerIntro;
      }

      // Portfolio items
      const container = byId('portfolio-container');
      container.innerHTML = '';

      (studentData.portfolio || []).forEach(function(item, idx) {
        const card = document.createElement('article');
        card.className = 'portfolio-item';

        // Title
        const h3 = document.createElement('h3');
        h3.textContent = item.title || ('Project ' + (idx + 1));
        card.appendChild(h3);

        // Description
        if (item.description) {
          const p = document.createElement('p');
          p.textContent = item.description;
          card.appendChild(p);
        }

        // Link
        if (item.link) {
          const a = document.createElement('a');
          a.className = 'portfolio-link';
          a.href = item.link;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.textContent = 'View Project';
          card.appendChild(a);
        }

        // Media (iframe or static image)
        const mediaWrapper = document.createElement('div');
        mediaWrapper.className = 'media-wrapper';

        if ((item.type || '').toLowerCase() === 'image') {
          const img = document.createElement('img');
          img.className = 'static-map-image';
          img.src = item.src || 'images/placeholder-map.svg';
          img.alt = 'Static map for ' + (item.title || 'project');
          mediaWrapper.appendChild(img);
        } else {
          const iframe = document.createElement('iframe');
          iframe.src = item.src || 'about:blank';
          iframe.loading = 'lazy';
          iframe.setAttribute('allowfullscreen', '');
          iframe.title = (item.title || 'Project') + ' Map';
          mediaWrapper.appendChild(iframe);
        }

        card.appendChild(mediaWrapper);
        container.appendChild(card);
      });

      // Last updated: prefer studentData.lastUpdated, else document.lastModified
      var updated = studentData.lastUpdated || document.lastModified;
      byId('last-updated').textContent = updated;
    })();
  </script>
</body>
</html>
